<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캘린더 | 42Gyeongsan Time Logger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calendar-page">
    <header class="calendar-top">
      <button id="prevMonthBtn" class="month-nav left" type="button">
        <span class="nav-arrow">‹</span>
        <span id="prevMonthLabel">이전</span>
      </button>

      <h1 id="monthTitle" class="month-title">6월</h1>

      <button id="nextMonthBtn" class="month-nav right" type="button">
        <span id="nextMonthLabel">다음</span>
        <span class="nav-arrow">›</span>
      </button>
    </header>

    <section class="calendar-card">
      <div class="weekday-row">
        <div class="weekday sunday">일</div>
        <div class="weekday">월</div>
        <div class="weekday">화</div>
        <div class="weekday">수</div>
        <div class="weekday">목</div>
        <div class="weekday">금</div>
        <div class="weekday saturday">토</div>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <section class="control-panel">
      <div class="selected-date-box">
        <span class="selected-label">선택 날짜</span>
        <strong id="selectedDateTitle">-</strong>
      </div>

      <div class="button-row">
        <button id="startBtn" class="start-button" type="button">로그 시작</button>
        <button id="stopBtn" class="stop-button" type="button">로그 종료</button>
      </div>

      <p id="runningStatus" class="running-status">상태 확인 중...</p>
    </section>

    <section class="total-card">
      <span class="clock-icon">◷</span>
      <span id="monthTotal">합계 시간 : 0시간 0분 0초</span>
    </section>

    <footer class="footer-bar">
      <button id="logoutBtn" class="logout-button" type="button">로그아웃</button>
      <p id="appMessage" class="message" aria-live="polite"></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
