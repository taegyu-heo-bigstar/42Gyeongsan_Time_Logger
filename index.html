<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>42Gyeongsan Time Logger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <p class="eyebrow">42Gyeongsan</p>
      <h1>Time Logger</h1>
      <p class="description">
        관리자 비밀번호로 로그인한 뒤 작업 시간을 기록합니다.
      </p>

      <form id="loginForm" class="form">
        <label for="password">관리자 비밀번호</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="비밀번호 입력"
          required
        />

        <button type="submit" class="primary-button">로그인</button>
      </form>

      <p id="loginMessage" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
