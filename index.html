<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>42Gyeongsan Time Logger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <p class="eyebrow">42Gyeongsan</p>
      <h1>Time Logger</h1>
      <p class="description">
        관리자 비밀번호로 로그인한 뒤 작업 시간을 기록합니다.
      </p>

      <form id="loginForm" class="form">
        <label for="password">관리자 비밀번호</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="비밀번호 입력"
          required
        />

        <button type="submit" class="primary-button">로그인</button>
      </form>

      <p id="loginMessage" class="message" aria-live="polite"></p>
    </section>
    <div id="dayModal" class="modal-backdrop hidden">
    <section class="day-modal">
      <header class="modal-header">
        <div>
          <p class="modal-label">선택 날짜</p>
          <h2 id="modalDateTitle">-</h2>
        </div>

        <div class="modal-actions">
          <button id="manualOpenBtn" class="manual-button" type="button">임의 설정</button>
          <button id="modalCloseBtn" class="modal-close-button" type="button">×</button>
        </div>
      </header>

      <form id="manualForm" class="manual-form hidden">
        <label>
          시작
          <input id="manualStartTime" type="time" required />
        </label>

        <label>
          종료
          <input id="manualEndTime" type="time" required />
        </label>

        <button type="submit">추가</button>
      </form>

      <div id="modalLogList" class="modal-log-list"></div>
    </section>
  </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
